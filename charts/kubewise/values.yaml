# Default values for kubewise.

namespace:
  create: true
  name: kubewise

nameOverride: ''
fullnameOverride: ''

image:
  agent:
    repository: ghcr.io/lohitkolluri/kubewise-agent
    tag: latest
    pullPolicy: IfNotPresent
  forecaster:
    repository: ghcr.io/lohitkolluri/kubewise-forecaster
    tag: latest
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: kubewise-agent

rbac:
  create: true
  # clusterScoped=true grants ClusterRole (default). false uses Role in release namespace only.
  clusterScoped: true
  # When clusterScoped=false, create Role+RoleBinding in these additional namespaces.
  extraNamespaces: []

service:
  type: ClusterIP
  port: 8080

persistence:
  # WARNING: Disabling persistence causes data loss on pod restart.
  # All anomaly history, predictions, audit trail, and health scores are lost.
  enabled: true
  size: 10Gi
  storageClass: ''

agent:
  scrapeInterval: 30s
  # Auto-detected at runtime if empty; set this to use a specific Prometheus-compatible endpoint.
  # When empty and the VM subchart is enabled, defaults to the subchart service.
  prometheusAddress: ""
  llmProvider: openrouter
  llmModel: deepseek/deepseek-v4-flash
  llmBaseURL: ''
  # Empty = watch all namespaces (subject to denylist). Non-empty limits observation scope.
  watchNamespaces: []
  remediation:
    mode: dry-run
    dryRun: true
    rateLimit: 3
    minConfidence: 0.7
    namespaceDenylist:
      - kube-system
      - kubewise
    allowlist: []
  # Feature gates for v2 capabilities. All default false (v1-compatible).
  features:
    ruleEngine: true
    contextBuilder: true
    llmRouter: true
    semanticCache: true
    eventsV2: true
    toolPlugins: true
    observability: true
  observability:
    # Namespace where VictoriaMetrics + VictoriaLogs are (or will be) deployed.
    # When using subchart deps (plain helm install), this defaults to the release namespace.
    namespace: kubewise
    # Subchart toggles — set false to skip if you already have a backend.
    vm:
      enabled: true
    vl:
      enabled: true
    # Override endpoints — set by kwctl install after auto-detection.
    # When empty, _helpers.tpl generates default URLs based on Helm conventions.
    metricsURL: ""
    logsEndpoint: ""
    logsPushEndpoint: ""
    tracesEndpoint: ""
    tracesOTLPEndpoint: ""
    # When agent.features.observability=true, Tempo + Alloy deploy together.
    # Metrics are stored in VictoriaMetrics, logs in VictoriaLogs
    # (both deployed in the observability namespace).
    # Alloy ships pod logs (namespace/pod labels) so the agent can query logs.
    tempo:
      enabled: true
      persistence:
        enabled: false
        size: 10Gi
        storageClass: ''
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: '1'
          memory: 1Gi
    alloy:
      # Grafana Alloy DaemonSet — scrapes pod logs and forwards to VictoriaLogs.
      enabled: true
      image:
        repository: grafana/alloy
        tag: v1.7.4
        pullPolicy: IfNotPresent
      # Overridden in alloy-daemonset.yaml via kubewise.lokiPushURL / tempoOTLPEndpoint helpers.
      lokiEndpoint: ''
      tempoEndpoint: ''
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  notifications:
    enabled: false
    webhookURL: ''
    slackWebhookURL: ''
    minScore: 0.7
    onPrediction: true
    onRemediation: true
    onApproval: true

secrets:
  # Set via --set secrets.openrouterApiKey=... or existingSecret
  openrouterApiKey: ''
  apiToken: ''
  existingSecret: ''

security:
  # When true, agent refuses to start without KUBEWISE_API_TOKEN (fail closed).
  requireApiToken: true
  # When true, RBAC includes pod exec/port-forward/attach primitives (high risk).
  enableExecPrimitives: false

resources:
  agent:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  forecaster:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 512Mi

# -- VictoriaMetrics subchart values (used when agent.observability.vm.enabled=true)
victoria-metrics-single:
  server:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: '1'
        memory: 1Gi

# -- VictoriaLogs subchart values (used when agent.observability.vl.enabled=true)
victoria-logs-single:
  server:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# -- Tempo subchart values (used when agent.observability.tempo.enabled=true)
tempo:
  tempo:
    search:
      enabled: true
    metricsGenerator:
      enabled: false
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  server:
    grpc_server_max_recv_msg: 4194304
    http_server_read_timeout: 30s
  persistence:
    enabled: false
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: '1'
      memory: 1Gi
