# Default values for kubewise.

namespace:
  create: true
  name: kubewise

nameOverride: ""
fullnameOverride: ""

image:
  agent:
    repository: ghcr.io/lohitkolluri/kubewise-agent
    tag: latest
    pullPolicy: IfNotPresent
  forecaster:
    repository: ghcr.io/lohitkolluri/kubewise-forecaster
    tag: latest
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: kubewise-agent

rbac:
  create: true
  # clusterScoped=true grants ClusterRole (default). false uses Role in release namespace only.
  clusterScoped: true
  # When clusterScoped=false, create Role+RoleBinding in these additional namespaces.
  extraNamespaces: []

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: false
  size: 2Gi
  storageClass: ""

agent:
  scrapeInterval: 30s
  prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  llmProvider: openrouter
  llmModel: openai/gpt-oss-120b
  llmBaseURL: ""
  # Empty = watch all namespaces (subject to denylist). Non-empty limits observation scope.
  watchNamespaces: []
  remediation:
    mode: dry-run
    dryRun: true
    rateLimit: 3
    minConfidence: 0.7
    namespaceDenylist:
      - kube-system
      - kubewise
    allowlist: []
  # Feature gates for v2 capabilities. All default false (v1-compatible).
  features:
    ruleEngine: false
    contextBuilder: false
    llmRouter: false
    semanticCache: false
    eventsV2: false
    toolPlugins: false
    observability: false
  observability:
    # When agent.features.observability=true, Loki + Tempo + Alloy are deployed.
    loki:
      enabled: false
      # Monolithic mode — single binary for in-cluster use.
      mode: Monolithic
      persistence:
        enabled: false
        size: 10Gi
        storageClass: ""
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
    tempo:
      enabled: false
      persistence:
        enabled: false
        size: 10Gi
        storageClass: ""
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
    alloy:
      # Grafana Alloy DaemonSet — scrapes pod logs and forwards to Loki.
      enabled: false
      image:
        repository: grafana/alloy
        tag: v1.7.4
        pullPolicy: IfNotPresent
      # Loki endpoint for log forwarding (in-cluster).
      lokiEndpoint: http://kubewise-loki:3100
      # Tempo endpoint for trace forwarding.
      tempoEndpoint: http://kubewise-tempo:4318
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

  notifications:
    enabled: false
    webhookURL: ""
    slackWebhookURL: ""
    minScore: 0.7
    onPrediction: true
    onRemediation: true
    onApproval: true

secrets:
  # Set via --set secrets.openrouterApiKey=... or existingSecret
  openrouterApiKey: ""
  apiToken: ""
  existingSecret: ""

security:
  # When true, agent refuses to start without KUBEWISE_API_TOKEN (fail closed).
  requireApiToken: false
  # When true, RBAC includes pod exec/port-forward/attach primitives (high risk).
  enableExecPrimitives: false

resources:
  agent:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  forecaster:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Loki subchart values (used when agent.observability.loki.enabled=true)
loki:
  deploymentMode: Monolithic
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
  loki:
    useTestSchema: true
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    auth_enabled: false
    analytics:
      reporting_enabled: false
  singleBinary:
    replicas: 0
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

# -- Tempo subchart values (used when agent.observability.tempo.enabled=true)
tempo:
  tempo:
    search:
      enabled: true
    metricsGenerator:
      enabled: false
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  server:
    grpc_server_max_recv_msg: 4194304
    http_server_read_timeout: 30s
  persistence:
    enabled: false
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
