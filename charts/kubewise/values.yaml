# Default values for kubewise.

namespace:
  create: true
  name: kubewise

nameOverride: ""
fullnameOverride: ""

image:
  agent:
    repository: ghcr.io/lohitkolluri/kubewise-agent
    tag: latest
    pullPolicy: IfNotPresent
  forecaster:
    repository: ghcr.io/lohitkolluri/kubewise-forecaster
    tag: latest
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: kubewise-agent

rbac:
  create: true
  # clusterScoped=true grants ClusterRole (default). false uses Role in release namespace only.
  clusterScoped: true
  # When clusterScoped=false, create Role+RoleBinding in these additional namespaces.
  extraNamespaces: []

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: false
  size: 2Gi
  storageClass: ""

agent:
  scrapeInterval: 30s
  prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
  llmProvider: openrouter
  llmModel: openrouter/gpt-oss-120b
  llmBaseURL: ""
  # Empty = watch all namespaces (subject to denylist). Non-empty limits observation scope.
  watchNamespaces: []
  remediation:
    mode: dry-run
    dryRun: true
    rateLimit: 3
    minConfidence: 0.7
    namespaceDenylist:
      - kube-system
      - kubewise
    allowlist: []
  # Feature gates for v2 capabilities. All default false (v1-compatible).
  features:
    ruleEngine: false
    contextBuilder: false
    llmRouter: false
    semanticCache: false
    eventsV2: false
    toolPlugins: false
    observability: false
  notifications:
    enabled: false
    webhookURL: ""
    slackWebhookURL: ""
    minScore: 0.7
    onPrediction: true
    onRemediation: true
    onApproval: true

secrets:
  # Set via --set secrets.openrouterApiKey=... or existingSecret
  openrouterApiKey: ""
  apiToken: ""
  existingSecret: ""

security:
  # When true, agent refuses to start without KUBEWISE_API_TOKEN (fail closed).
  requireApiToken: false

resources:
  agent:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  forecaster:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
