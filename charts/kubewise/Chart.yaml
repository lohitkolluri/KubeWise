apiVersion: v2
name: kubewise
description: In-cluster Kubernetes predictive observability and safe AI remediation agent
type: application
version: 0.4.0
appVersion: "0.4.0"
keywords:
  - kubernetes
  - observability
  - sre
  - remediation
home: https://github.com/lohitkolluri/KubeWise
sources:
  - https://github.com/lohitkolluri/KubeWise

dependencies:
  - name: loki
    version: ">=13.0.0 <14.0.0"
    repository: oci://ghcr.io/grafana-community/helm-charts
    condition: agent.observability.loki.enabled
  - name: tempo
    version: ">=1.0.0 <2.0.0"
    repository: oci://ghcr.io/grafana-community/helm-charts
    condition: agent.observability.tempo.enabled
