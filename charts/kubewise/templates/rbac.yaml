{{- if .Values.rbac.create }}
{{- $ns := include "kubewise.namespace" . }}
{{- $sa := include "kubewise.serviceAccountName" . }}
{{- if .Values.rbac.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubewise.fullname" . }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, pods/exec, pods/portforward, pods/attachment, pods/log]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/status, services, configmaps, secrets, events, endpoints, persistentvolumeclaims, persistentvolumes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete, patch, update]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [patch, update]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings, clusterroles, clusterrolebindings]
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, update]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubewise.fullname" . }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubewise.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $ns }}
{{- else }}
{{- $namespaces := append (list $ns) .Values.rbac.extraNamespaces }}
{{- range $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubewise.fullname" $ }}
  namespace: {{ . }}
  labels:
    {{- include "kubewise.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/exec, pods/portforward, pods/attachment, pods/log, pods/status, events, configmaps, secrets, services, endpoints, persistentvolumeclaims]
    verbs: [get, list, watch, delete, patch, update, create]
  - apiGroups: ["apps"]
    resources: [deployments, deployments/status, statefulsets, daemonsets, replicasets, replicasets/status]
    verbs: [get, list, watch, patch, update, create, delete]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, delete]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, update]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubewise.fullname" $ }}
  namespace: {{ . }}
  labels:
    {{- include "kubewise.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubewise.fullname" $ }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $ns }}
{{- end }}
{{- end }}
{{- end }}
