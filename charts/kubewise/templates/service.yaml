apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubewise.fullname" . }}
  namespace: {{ include "kubewise.namespace" . }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubewise.selectorLabels" . | nindent 4 }}
