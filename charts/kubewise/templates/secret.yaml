{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubewise.secretName" . }}
  namespace: {{ include "kubewise.namespace" . }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
type: Opaque
stringData:
  openrouter_api_key: {{ .Values.secrets.openrouterApiKey | quote }}
  api_token: {{ .Values.secrets.apiToken | quote }}
  client_password_hash: {{ .Values.secrets.clientPasswordHash | quote }}
{{- end }}
