{{- if and .Values.agent.features.observability .Values.agent.observability.alloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubewise.fullname" . }}-alloy-config
  namespace: {{ include "kubewise.namespace" . }}
  labels:
    {{- include "kubewise.labels" . | nindent 4 }}
    app.kubernetes.io/component: alloy-config
data:
  config.alloy: |
    // Scrape pod logs from /var/log/pods using the Kubernetes-logging discovery.
    discovery.kubernetes "pods" {
      role = "pod"
      selectors {
        role  = "pod"
        field = "status.phase!=Succeeded,status.phase!=Failed"
      }
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "__host__"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        replacement = discovery.kubernetes.pods.target
        target_label = "instance"
      }
    }

    // Read container logs from /var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log
    loki.source.file "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.filter_logs.receiver]
      tail_from_end = false
    }

    // Filter out health-check noise and only forward error/warning level logs.
    loki.process "filter_logs" {
      stage.match {
        selector = "{container=~\"agent|forecaster\"}"
        stage.logfmt {}
        stage.drop {
          source = "level"
          value  = "info"
        }
        stage.drop {
          source = "level"
          value  = "debug"
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // Write to in-cluster Loki.
    loki.write "default" {
      endpoint {
        url = env("ALLOY_LOKI_ENDPOINT") + "/loki/api/v1/push"

        // Enable snappy compression.
        headers = {
          "Content-Encoding" = "snappy",
        }
      }
    }

    // Forward traces to Tempo via OTLP.
    otelcol.receiver.otlp "default" {
      http {
        endpoint = "0.0.0.0:4318"
      }
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = env("ALLOY_TEMPO_ENDPOINT")
        tls {
          insecure             = true
          insecure_skip_verify = true
        }
      }
    }
{{- end }}
