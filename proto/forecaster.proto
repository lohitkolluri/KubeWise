syntax = "proto3";

package forecaster;

option go_package = "github.com/lohitkolluri/KubeWise/internal/agent/forecaster/pb";

// Forecaster provides forward-looking predictions for metric time series.
service Forecaster {
  // Forecast takes a metric history and predicts future values with
  // confidence intervals.
  rpc Forecast(ForecastRequest) returns (ForecastResponse);
}

message ForecastRequest {
  string metric_name = 1;
  repeated double values = 2;
  repeated double timestamps = 3;           // unix seconds
  map<string, string> labels = 4;
  int32 horizon = 5;                        // number of steps to predict
  double interval_seconds = 6;              // expected interval between points
}

message ForecastPoint {
  double timestamp = 1;                     // predicted unix seconds
  double value = 2;                         // point forecast
  double lower_bound = 3;                   // 95% prediction interval lower
  double upper_bound = 4;                   // 95% prediction interval upper
}

message ForecastResponse {
  repeated ForecastPoint points = 1;
  string status = 2;                        // "ok" or "error"
  string error_message = 3;
}
