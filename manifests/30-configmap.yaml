apiVersion: v1
kind: ConfigMap
metadata:
  name: kubewise-agent-config
  namespace: kubewise
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
data:
  config.yaml: |
    scrape_interval: 30s
    prometheus_address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    llm_provider: openrouter
    llm_model: meta-llama/llama-3.1-8b-instruct
    remediation:
      mode: dry-run
      dry_run: true
      rate_limit: 3
      namespace_denylist:
        - kube-system
        - kubewise
      allowlist: []
