apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
rules:
  # Read-only observability (no Secrets by default).
  - apiGroups: ['']
    resources: [pods, pods/status, pods/log, events, services, endpoints, persistentvolumeclaims]
    verbs: [get, list, watch]
  - apiGroups: ['apps']
    resources:
      [deployments, deployments/status, replicasets, replicasets/status, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: ['']
    resources: [nodes, nodes/status]
    verbs: [get, list, watch]
  # Remediation writes (scoped to supported actions).
  - apiGroups: ['']
    resources: [pods]
    verbs: [delete, patch, update]
  - apiGroups: ['apps']
    resources: [deployments]
    verbs: [patch, update]
  # Leader election (HA).
  - apiGroups: ['coordination.k8s.io']
    resources: [leases]
    verbs: [get, list, watch, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubewise-agent
subjects:
  - kind: ServiceAccount
    name: kubewise-agent
    namespace: kubewise
