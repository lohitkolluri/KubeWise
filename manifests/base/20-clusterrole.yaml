apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
rules:
  # Metrics collection & observation
  - apiGroups: [""]
    resources: [pods, pods/status, pods/log, nodes, nodes/status, events]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, deployments/status, replicasets, replicasets/status]
    verbs: [get, list, watch]
  # Live remediation (T1/T2/T3 after approval)
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [patch, update]
  # Leader election (future HA)
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubewise-agent
subjects:
  - kind: ServiceAccount
    name: kubewise-agent
    namespace: kubewise
