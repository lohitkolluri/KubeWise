apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
rules:
  # Full read access for diagnostics and investigation
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: [get, list, watch]
  # Full write access for remediation operations
  - apiGroups: [""]
    resources: [pods, pods/exec, pods/portforward, pods/attachment, pods/log]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/status, services, configmaps, secrets, events, endpoints, persistentvolumeclaims, persistentvolumes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete, patch, update]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [patch, update]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings, clusterroles, clusterrolebindings]
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, update]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubewise-agent
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubewise-agent
subjects:
  - kind: ServiceAccount
    name: kubewise-agent
    namespace: kubewise
