apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubewise-agent
  namespace: kubewise
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubewise
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubewise
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: kubewise-agent
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: kubewise-agent-config
        - name: data
          emptyDir: {}
        - name: forecaster-tmp
          emptyDir: {}
      containers:
        - name: agent
          image: kubewise/agent:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/kubewise
              readOnly: true
            - name: data
              mountPath: /var/lib/kubewise
          env:
            - name: KUBEWISE_CONFIG_PATH
              value: /etc/kubewise/config.yaml
            - name: KUBEWISE_DATA_DIR
              value: /var/lib/kubewise
            - name: FORECASTER_ADDR
              value: localhost:50051
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubewise-agent-secret
                  key: openrouter_api_key
                  optional: true
            - name: KUBEWISE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubewise-agent-secret
                  key: api_token
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
        - name: forecaster
          image: kubewise/forecaster:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: forecaster-tmp
              mountPath: /tmp
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: FORECASTER_PORT
              value: "50051"
            - name: FORECASTER_HEALTH_PORT
              value: "8081"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 18
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            timeoutSeconds: 3
