apiVersion: v1
kind: Service
metadata:
  name: kubewise-tempo
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: tempo
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      protocol: TCP
      name: http
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
    - port: 16686
      targetPort: 16686
      protocol: TCP
      name: jaeger-ui
  selector:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: tempo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kubewise-tempo
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: tempo
spec:
  serviceName: kubewise-tempo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubewise
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubewise
        app.kubernetes.io/component: tempo
    spec:
      serviceAccountName: kubewise-tempo
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: kubewise-tempo-config
        - name: data
          emptyDir: {}
      containers:
        - name: tempo
          image: grafana/tempo:2.7.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: http
              containerPort: 3200
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: jaeger-ui
              containerPort: 16686
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/tempo
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
