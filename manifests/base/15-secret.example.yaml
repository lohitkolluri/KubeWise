# Example secret — copy to 15-secret.yaml and apply, or use your secret manager.
#   cp manifests/15-secret.example.yaml manifests/15-secret.yaml
#   kubectl apply -k manifests/
#
# Do NOT commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: kubewise-secret
  namespace: kubewise
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: agent
type: Opaque
stringData:
  openrouter_api_key: 'replace-me'
  # Optional API token for agent HTTP API (maps to KUBEWISE_API_TOKEN in middleware)
  api_token: ''
