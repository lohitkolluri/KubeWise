apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubewise

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - 00-namespace.yaml
  - 10-serviceaccount.yaml
  - 11-alloy-sa.yaml
  - 12-tempo-sa.yaml
  - 20-clusterrole.yaml
  - 21-alloy-clusterrole.yaml
  - 40-deployment.yaml
  - 50-service.yaml
  - 60-alloy.yaml
  - 70-tempo.yaml

configMapGenerator:
  - name: kubewise-agent-config
    files:
      - config.yaml=configs/agent-config.yaml
  - name: kubewise-alloy-config
    files:
      - config.alloy=configs/alloy-config.alloy
  - name: kubewise-tempo-config
    files:
      - tempo.yaml=configs/tempo-config.yaml

generatorOptions:
  labels:
    app.kubernetes.io/name: kubewise
    app.kubernetes.io/component: config
  disableNameSuffixHash: false

images:
  - name: grafana/alloy
    newTag: v1.7.4
  - name: grafana/tempo
    newTag: 2.7.1
