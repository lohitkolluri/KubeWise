# Remote one-click install overlay (public container images).
#   kubectl apply -k github.com/lohitkolluri/KubeWise/manifests/overlays/install?ref=main
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: kubewise-agent-config
    behavior: merge
    files:
      - config.yaml=configs/agent-config.yaml

images:
  - name: kubewise/agent
    newName: ghcr.io/lohitkolluri/kubewise-agent
    newTag: v0.3.0
  - name: kubewise/forecaster
    newName: ghcr.io/lohitkolluri/kubewise-forecaster
    newTag: v0.3.0
