apiVersion: v1
kind: ConfigMap
metadata:
  name: kubewise-agent-config
  namespace: kubewise
data:
  config.yaml: |
    scrape_interval: 30s
    prometheus_address: http://prometheus.monitoring.svc.cluster.local:9090
    loki_url: http://kubewise-loki-gateway.kubewise.svc.cluster.local
    tempo_url: http://kubewise-tempo.kubewise.svc.cluster.local:3200
    llm_provider: openrouter
    llm_model: deepseek/deepseek-v4-flash
    remediation:
      mode: dry-run
      dry_run: true
      rate_limit: 3
      namespace_denylist:
        - kube-system
        - kubewise
    notifications:
      enabled: false
      min_score: 0.7
      on_prediction: true
      on_remediation: true
      on_approval: true
