apiVersion: v1
kind: ConfigMap
metadata:
  name: kubewise-agent-config
  namespace: kubewise
data:
  config.yaml: |
    scrape_interval: 30s
    prometheus_address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    llm_provider: openrouter
    # Prefer non-:free GPT-OSS in dev for reliability (user preference).
    # Alternatives:
    #   openai/gpt-oss-120b:free
    #   poolside/laguna-m.1:free
    #   google/gemini-2.0-flash-001
    llm_model: openai/gpt-oss-120b
    remediation:
      mode: dry-run
      dry_run: true
      rate_limit: 3
      namespace_denylist:
        - kube-system
        - kubewise
    notifications:
      enabled: false
      min_score: 0.7
      on_prediction: true
      on_remediation: true
      on_approval: true
