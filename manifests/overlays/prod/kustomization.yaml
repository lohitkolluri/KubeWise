apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - pvc.yaml

images:
  - name: kubewise/agent
    newName: kubewise/agent
    newTag: latest
  - name: kubewise/forecaster
    newName: kubewise/forecaster
    newTag: latest

patches:
  - path: deployment-patch.yaml
