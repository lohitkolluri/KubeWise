name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6

      - name: Test
        run: go test ./... -count=1 -race -timeout=5m

  helm:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: |
          helm lint ./charts/kubewise
          helm template kubewise ./charts/kubewise >/dev/null

  docker-agent:
    runs-on: ubuntu-latest
    needs: [test, helm]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: false
          platforms: linux/amd64
          tags: kubewise/agent:ci

  docker-forecaster:
    runs-on: ubuntu-latest
    needs: [test, helm]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build forecaster image
        uses: docker/build-push-action@v6
        with:
          context: forecaster-sidecar
          push: false
          platforms: linux/amd64
          tags: kubewise/forecaster:ci
          load: true

      - name: Forecaster unit tests
        run: docker run --rm kubewise/forecaster:ci python -m unittest test_server.py -v
