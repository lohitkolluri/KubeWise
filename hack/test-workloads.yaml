# Synthetic failure workloads for KubeWise detection / remediation testing.
# Namespace kw-test is outside the agent denylist (kube-system, kubewise).
apiVersion: v1
kind: Namespace
metadata:
  name: kw-test
  labels:
    app.kubernetes.io/part-of: kubewise-test
---
# CrashLoopBackOff — triggers CrashLoopRule + restart_rate metrics
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-demo
  namespace: kw-test
  labels:
    app: crashloop-demo
spec:
  restartPolicy: Always
  containers:
    - name: crash
      image: busybox:1.36
      command: ['sh', '-c', 'echo crashloop-demo starting && exit 1']
---
# OOMKilled — triggers OOMRule via kube events + memory pressure
apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  namespace: kw-test
  labels:
    app: oom-demo
spec:
  restartPolicy: Always
  containers:
    - name: stress
      image: polinux/stress:latest
      resources:
        limits:
          memory: '48Mi'
          cpu: '200m'
      command: ['stress', '--vm', '1', '--vm-bytes', '96M', '--vm-hang', '0']
---
# ImagePullBackOff — triggers ImagePullBackOffRule
apiVersion: v1
kind: Pod
metadata:
  name: imagepull-demo
  namespace: kw-test
  labels:
    app: imagepull-demo
spec:
  restartPolicy: Always
  containers:
    - name: bad-image
      image: registry.invalid/kubewise-test/does-not-exist:v0
---
# CPU throttling — elevated cpu_throttled metrics
apiVersion: v1
kind: Pod
metadata:
  name: cpu-throttle-demo
  namespace: kw-test
  labels:
    app: cpu-throttle-demo
spec:
  restartPolicy: Always
  containers:
    - name: burn
      image: polinux/stress:latest
      resources:
        limits:
          cpu: '50m'
      command: ['stress', '--cpu', '2', '--timeout', '3600s']
---
# Unschedulable — triggers PendingRule after ~5m
apiVersion: v1
kind: Pod
metadata:
  name: pending-demo
  namespace: kw-test
  labels:
    app: pending-demo
spec:
  restartPolicy: Never
  nodeSelector:
    kubewise-test: 'nonexistent-node-pool'
  containers:
    - name: pause
      image: busybox:1.36
      command: ['sleep', '3600']
---
# Failing liveness probe — restarts + probe failure events
apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-fail-demo
  namespace: kw-test
  labels:
    app: probe-fail-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-fail-demo
  template:
    metadata:
      labels:
        app: probe-fail-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ['sleep', '3600']
          livenessProbe:
            exec:
              command: ['sh', '-c', 'exit 1']
            initialDelaySeconds: 5
            periodSeconds: 10
