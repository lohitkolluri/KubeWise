# Ephemeral workloads to exercise KubeWise detection + LLM correlation.
# Namespace is NOT in agent denylist (kube-system, kubewise).
apiVersion: v1
kind: Namespace
metadata:
  name: kw-test
---
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-demo
  namespace: kw-test
  labels:
    app: crashloop-demo
spec:
  restartPolicy: Always
  containers:
    - name: crash
      image: busybox:1.36
      command: ["sh", "-c", "echo starting && exit 1"]
---
apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  namespace: kw-test
  labels:
    app: oom-demo
spec:
  restartPolicy: Never
  containers:
    - name: stress
      image: polinux/stress:latest
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
      command: ["stress", "--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
