version: '2'

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose

formatters:
  enable:
    - gofmt
    - goimports

formatters-settings:
  goimports:
    local-prefixes:
      - github.com/lohitkolluri/KubeWise

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
